<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — EconCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0a0b0e;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:48px;max-width:420px;width:90%;backdrop-filter:blur(12px)}
    .login-card h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#d4a843,#f0d080);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;text-align:center}
    .login-card p{color:#7a8090;text-align:center;margin-bottom:32px;font-size:.9rem}
    .login-card form{display:flex;flex-direction:column;gap:16px}
    .login-card input{padding:14px 18px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:#e8eaf0;font-family:'Inter',sans-serif;font-size:.95rem;outline:none;transition:all .3s}
    .login-card input:focus{border-color:#d4a843;background:rgba(212,168,67,.04);box-shadow:0 0 0 3px rgba(212,168,67,.08)}
    .login-card button{padding:14px;border-radius:12px;background:linear-gradient(135deg,#d4a843,#b8862a);color:#0a0b0e;font-weight:700;font-size:1rem;border:none;cursor:pointer;transition:all .3s}
    .login-card button:hover{transform:translateY(-2px);box-shadow:0 8px 24px -4px rgba(212,168,67,.3)}
    .flash{text-align:center;color:#e74c3c;font-size:.85rem;margin-bottom:8px}
    .back-link{display:block;text-align:center;margin-top:20px;color:#5a6070;font-size:.82rem;text-decoration:none;transition:color .3s}
    .back-link:hover{color:#d4a843}
  </style>
</head>
<body>
  <div class="login-card">
    <h1>EconCore</h1>
    <p>Admin Panel · Authorized Access Only</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <input type="text" name="username" placeholder="Username" required autofocus />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit"><i class="fas fa-shield-alt" style="margin-right:8px"></i> Sign In</button>
    </form>
    <a href="/" class="back-link"><i class="fas fa-arrow-left" style="margin-right:6px"></i> Back to Website</a>
  </div>
</body>
</html>
